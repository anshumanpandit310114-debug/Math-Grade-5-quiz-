<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 5 Maths Quiz</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4b79a1, #283e51);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2.8rem;
            text-align: center;
        }
        p.description {
            text-align: center;
            margin-bottom: 25px;
            color: #d7e1f2;
        }
        .question {
            margin-bottom: 20px;
        }
        .question h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .options {
            display: grid;
            gap: 12px;
        }
        label {
            display: block;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        input[type="radio"] {
            margin-right: 10px;
            accent-color: #ffd700;
        }
        label:hover {
            transform: translateX(6px);
            background: rgba(255, 255, 255, 0.2);
        }
        .actions {
            margin-top: 25px;
            text-align: center;
        }
        button {
            background: #ffd700;
            color: #1b1b1b;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .result {
            margin-top: 25px;
            text-align: center;
            font-size: 1.2rem;
            padding: 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
    </style>
</head>
<body>
    <div class="quiz-card">
        <h1>Grade 5 Maths Quiz</h1>
        <p class="description">Answer all 5 questions and press Submit to see your score.</p>
        <form id="quizForm">
            <div class="question">
                <h2>1. What is 256 + 389?</h2>
                <div class="options">
                    <label><input type="radio" name="q1" value="645">645</label>
                    <label><input type="radio" name="q1" value="635">635</label>
                    <label><input type="radio" name="q1" value="655">655</label>
                </div>
            </div>
            <div class="question">
                <h2>2. Which number is 4 times 37?</h2>
                <div class="options">
                    <label><input type="radio" name="q2" value="148">148</label>
                    <label><input type="radio" name="q2" value="124">124</label>
                    <label><input type="radio" name="q2" value="154">154</label>
                </div>
            </div>
            <div class="question">
                <h2>3. What is 5 × 18?</h2>
                <div class="options">
                    <label><input type="radio" name="q3" value="90">90</label>
                    <label><input type="radio" name="q3" value="85">85</label>
                    <label><input type="radio" name="q3" value="95">95</label>
                </div>
            </div>
            <div class="question">
                <h2>4. A rectangle has length 12 cm and width 7 cm. What is its area?</h2>
                <div class="options">
                    <label><input type="radio" name="q4" value="84">84 cm²</label>
                    <label><input type="radio" name="q4" value="76">76 cm²</label>
                    <label><input type="radio" name="q4" value="96">96 cm²</label>
                </div>
            </div>
            <div class="question">
                <h2>5. What is 3/4 of 44?</h2>
                <div class="options">
                    <label><input type="radio" name="q5" value="33">33</label>
                    <label><input type="radio" name="q5" value="30">30</label>
                    <label><input type="radio" name="q5" value="36">36</label>
                </div>
            </div>
            <div class="actions">
                <button type="button" onclick="gradeQuiz()">Submit</button>
            </div>
            <div id="result" class="result" style="display:none"></div>
        </form>
    </div>
    <script>
        function gradeQuiz() {
            const answers = {
                q1: '645',
                q2: '148',
                q3: '90',
                q4: '84',
                q5: '33'
            };
            let score = 0;
            let missing = false;
            const form = document.getElementById('quizForm');

            for (const question in answers) {
                const userAnswer = form.elements[question].value;
                if (!userAnswer) {
                    missing = true;
                    break;
                }
                if (userAnswer === answers[question]) {
                    score += 1;
                }
            }

            const resultBox = document.getElementById('result');
            if (missing) {
                resultBox.style.display = 'block';
                resultBox.textContent = 'Please answer all 5 questions before submitting.';
                resultBox.style.background = 'rgba(255, 165, 0, 0.2)';
                return;
            }

            resultBox.style.display = 'block';
            resultBox.style.background = 'rgba(144, 238, 144, 0.2)';
            resultBox.textContent = 'You scored ' + score + ' out of 5! ' + (score === 5 ? 'Amazing job!' : 'Try again to improve your score!');
        }
    </script>
</body>
</html>
